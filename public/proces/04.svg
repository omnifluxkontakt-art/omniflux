<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07161e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a3d4d"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes grow { 0%, 8% { transform: scaleY(0.15); } 45%, 100% { transform: scaleY(1); } }
    @keyframes draw { 0%, 20% { stroke-dashoffset: 480; } 70%, 100% { stroke-dashoffset: 0; } }
    @keyframes blink { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes glow { 0%, 100% { stroke-opacity: 0.45; } 50% { stroke-opacity: 1; } }
    .slupek { transform-origin: center 660px; animation: grow 5s cubic-bezier(0.22, 1, 0.36, 1) infinite; }
    .s2 { animation-delay: 0.25s; }
    .s3 { animation-delay: 0.5s; }
    .trend { stroke-dasharray: 480; animation: draw 5s ease-in-out infinite; }
    .label { animation: blink 3.2s ease-in-out infinite; }
    .num { animation: glow 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <rect width="600" height="800" fill="url(#bg)"/>
  <text class="num" x="60" y="280" font-family="Arial, sans-serif" font-size="220" font-weight="bold" fill="none" stroke="#00e5ff" stroke-width="2">04</text>
  <g>
    <rect class="slupek" x="140" y="560" width="70" height="100" fill="url(#bar)" opacity="0.55"/>
    <rect class="slupek s2" x="240" y="500" width="70" height="160" fill="url(#bar)" opacity="0.75"/>
    <rect class="slupek s3" x="340" y="430" width="70" height="230" fill="url(#bar)"/>
  </g>
  <path class="trend" d="M150 520 L 270 450 L 380 380 L 470 330 l -28 0 m 28 0 l -6 27" fill="none" stroke="#68e3ff" stroke-width="3" stroke-linecap="round"/>
  <text class="label" x="60" y="730" font-family="monospace" font-size="24" fill="#68e3ff" letter-spacing="6">MIERZYMY — SKALUJEMY</text>
</svg>
