<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#09202b"/>
      <stop offset="100%" stop-color="#0a0d0a"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes scan { 0%, 100% { transform: rotate(-7deg); } 50% { transform: rotate(7deg); } }
    @keyframes ping { 0% { transform: scale(0.4); opacity: 0.9; } 80%, 100% { transform: scale(1.25); opacity: 0; } }
    @keyframes blink { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes glow { 0%, 100% { stroke-opacity: 0.45; } 50% { stroke-opacity: 1; } }
    .lupa { transform-origin: 300px 520px; animation: scan 5s ease-in-out infinite; }
    .fala { transform-origin: 300px 520px; animation: ping 2.6s ease-out infinite; }
    .label { animation: blink 3.2s ease-in-out infinite; }
    .num { animation: glow 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <rect width="600" height="800" fill="url(#bg)"/>
  <text class="num" x="60" y="280" font-family="Arial, sans-serif" font-size="220" font-weight="bold" fill="none" stroke="#00e5ff" stroke-width="2">01</text>
  <circle class="fala" cx="300" cy="520" r="110" fill="none" stroke="#00e5ff" stroke-width="2"/>
  <g class="lupa">
    <circle cx="300" cy="520" r="110" fill="none" stroke="#68e3ff" stroke-width="3"/>
    <circle cx="300" cy="520" r="60" fill="none" stroke="#68e3ff" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="300" cy="520" r="14" fill="#00e5ff"/>
    <line x1="380" y1="600" x2="470" y2="690" stroke="#68e3ff" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text class="label" x="60" y="730" font-family="monospace" font-size="24" fill="#68e3ff" letter-spacing="6">SŁUCHAMY — PYTAMY</text>
</svg>
